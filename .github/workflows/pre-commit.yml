name: Pre-commit Checks

on: [push, pull_request]

jobs:
  run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    env:
      OS: ubuntu-latest
      PYTHON: "3.10"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Create .venv and install Wisecore with dev dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -q -U pip setuptools==68.2.2 wheel==0.41.2
          .venv/bin/pip install -q -e ".[dev]"

      - name: Install pre-commit hooks
        run: |
          .venv/bin/pre-commit install

      - name: Run pre-commit
        run: |
          .venv/bin/pre-commit run --all-files > pre-commit.log 2>&1 || true
          cat pre-commit.log
          if grep -q Failed pre-commit.log; then
            echo -e "\e[41m  [**FAIL**] pre-commit checks failed. Run '.venv/bin/pre-commit run --all-files' locally (from a project .venv), commit any auto-fixes, then push again. \e[0m"
            exit 1
          fi
          echo -e "\e[46m  ********************************Passed******************************** \e[0m"
